name: game_tetris_new
description: Neon Tetris - A vibrant neon-themed Tetris game
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.3.2

  # UI & animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Ads
  google_mobile_ads: ^5.3.0

  # Icons
  cupertino_icons: ^1.0.8

  # Localization
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/images/
