name: Build Android AAB

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-aab:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Validate signing secrets
        run: |
          test -n "${{ secrets.KEYSTORE_BASE64 }}" || (echo "Missing KEYSTORE_BASE64" && exit 1)
          test -n "${{ secrets.KEYSTORE_KEY_ALIAS }}" || (echo "Missing KEYSTORE_KEY_ALIAS" && exit 1)
          test -n "${{ secrets.KEYSTORE_KEY_PASSWORD }}" || (echo "Missing KEYSTORE_KEY_PASSWORD" && exit 1)
          test -n "${{ secrets.KEYSTORE_STORE_PASSWORD }}" || (echo "Missing KEYSTORE_STORE_PASSWORD" && exit 1)

      - name: Create signing files from secrets
        run: |
          mkdir -p android/app
          echo -n "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/game_tetris.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}
          keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}
          storeFile=app/game_tetris.jks
          EOF

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/*.aab
          if-no-files-found: error
